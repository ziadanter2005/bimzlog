<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  text-align: center;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.logo { color:#38bdf8; }

input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 20px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#020617;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">BIMZ</div>
  <div id="userName"></div>
</div>

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>

<h3>Upload Tool</h3>

<input id="name" placeholder="Tool Name"><br>
<input id="type" placeholder="Type (Dynamo / LISP)"><br>
<input id="link" placeholder="Download Link"><br>

<button onclick="addTool()">Add Tool</button>

<div id="tools" class="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4",
  storageBucket: "bimz-439c4.firebasestorage.app",
  messagingSenderId: "755613694385",
  appId: "1:755613694385:web:3e4390196df61f45732590"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Logout
window.logout = ()=> signOut(auth);

// Add Tool (لينك فقط)
window.addTool = async ()=>{
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  const link = document.getElementById("link").value;

  if(!name || !link) return alert("Fill all fields");

  await addDoc(collection(db,"tools"),{
    name:name,
    type:type,
    download:link,
    downloads:0,
    views:0
  });

  alert("Tool Added 🔥");
  loadTools();
};

// Load Tools
async function loadTools(){
  const snapshot = await getDocs(collection(db,"tools"));

  let tools = snapshot.docs.map(doc=>({
    id:doc.id,
    ...doc.data()
  }));

  // ترتيب حسب الأكثر تحميل
  tools.sort((a,b)=>(b.downloads||0)-(a.downloads||0));

  const container = document.getElementById("tools");
  container.innerHTML="";

  tools.forEach(t=>{
    container.innerHTML += `
      <div class="card">
        <h3>${t.name}</h3>
        <p>${t.type}</p>
        <p>⬇ ${t.downloads||0}</p>
        <button onclick="downloadTool('${t.id}','${t.download}')">
          Download
        </button>
      </div>
    `;
  });
}

// Download + Counter
window.downloadTool = async (id,link)=>{
  const refDoc = doc(db,"tools",id);

  await updateDoc(refDoc,{
    downloads: increment(1),
    views: increment(1)
  });

  window.open(link,"_blank");
  loadTools();
};

loadTools();

</script>

</body>
</html>
