<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:#fff;
  text-align:center;
}

h1{margin-top:30px;}

.container{
  max-width:900px;
  margin:auto;
}

.tools{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:30px;
}

.card{
  background:#020617;
  padding:20px;
  border-radius:15px;
  width:250px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
  background:#38bdf8;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>BIMZ Tools</h1>

<div class="container">
  <div class="tools" id="toolsContainer"></div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// 🔥 Firebase config بتاعك
const firebaseConfig = {
  apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4",
  storageBucket: "bimz-439c4.firebasestorage.app",
  messagingSenderId: "755613694385",
  appId: "1:755613694385:web:3e4390196df61f45732590"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// تحميل الأدوات
async function loadTools(){
  const container = document.getElementById("toolsContainer");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db,"tools"));

  snapshot.forEach(docSnap=>{
    const t = docSnap.data();
    const id = docSnap.id;

    container.innerHTML += `
      <div class="card">
        <h3>${t.name}</h3>
        <p>${t.type}</p>
        <p>Downloads: ${t.downloads || 0}</p>
        <button onclick="downloadTool('${id}','${t.download}')">Download</button>
      </div>
    `;
  });
}

// تحميل + عداد
window.downloadTool = async (id,link)=>{
  await updateDoc(doc(db,"tools",id),{
    downloads: increment(1)
  });

  window.open(link,"_blank");
};

// تشغيل
loadTools();

</script>

</body>
</html>
