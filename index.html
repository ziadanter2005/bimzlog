<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
}

.logo {
  color: #38bdf8;
  font-weight: bold;
}

button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  border-radius: 8px;
  margin: 10px;
}

.card {
  background: #020617;
  padding: 20px;
  margin: 20px auto;
  width: 250px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">BIMZ</div>
  <div id="userName"></div>
</div>

<h1>Dashboard</h1>

<button id="loginBtn" onclick="login()">Login with Google</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<div class="card">Dynamo Tools 🔧</div>
<div class="card">LISP Tools ⚡</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4",
  storageBucket: "bimz-439c4.firebasestorage.app",
  messagingSenderId: "755613694385",
  appId: "1:755613694385:web:3e4390196df61f45732590"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userName = document.getElementById("userName");

// Login
window.login = async function () {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    alert(error.message);
  }
};

// Logout
window.logout = async function () {
  await signOut(auth);
};

// Save User Function
async function saveUser(user) {
  try {
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      email: user.email,
      uid: user.uid
    });
    console.log("User saved ✅");
  } catch (e) {
    console.error("Error saving user ❌", e);
  }
}

// Auth State
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";
    userName.innerText = "👤 " + user.displayName;

    // 🔥 Save user to Firestore
    saveUser(user);

  } else {
    loginBtn.style.display = "inline";
    logoutBtn.style.display = "none";
    userName.innerText = "";
  }
});
</script>

</body>
</html>
