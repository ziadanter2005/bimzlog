<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Platform</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h1>BIMZ Platform</h1>

<!-- Buttons -->
<button id="loginBtn" onclick="login()" style="padding:12px 25px;font-size:18px;cursor:pointer;">
Login with Google
</button>

<button id="logoutBtn" onclick="logout()" style="display:none;padding:12px 25px;font-size:18px;cursor:pointer;">
Logout
</button>

<p id="userName" style="margin-top:20px;font-size:20px;"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
    authDomain: "bimz-439c4.firebaseapp.com",
    projectId: "bimz-439c4",
    storageBucket: "bimz-439c4.firebasestorage.app",
    messagingSenderId: "755613694385",
    appId: "1:755613694385:web:3e4390196df61f45732590"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const userName = document.getElementById("userName");

  // Login
  window.login = async function () {
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      alert(error.message);
    }
  };

  // Logout
  window.logout = async function () {
    await signOut(auth);
  };

  // User State
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline";
      userName.innerText = "Welcome " + user.displayName;
    } else {
      loginBtn.style.display = "inline";
      logoutBtn.style.display = "none";
      userName.innerText = "";
    }
  });
</script>

</body>
</html>
