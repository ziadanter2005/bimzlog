<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#05080f;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
}

.logo{
  font-family:'Syne';
  font-size:22px;
  color:#38bdf8;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:50px;
}

.hero span{
  color:#38bdf8;
}

/* TOOLS */
.section{
  padding:40px;
}

.tg{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.tc{
  background:#0e1525;
  border:1px solid #1a2540;
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}

.tc:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.tc-name{
  font-size:18px;
  font-weight:bold;
}

.tc-desc{
  color:#8899bb;
  margin-top:5px;
}

.tc-meta{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.btn-download{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.btn-download:hover{
  background:#0ea5e9;
}
</style>
</head>

<body>

<nav>
  <div class="logo">BIMZ</div>
</nav>

<div class="hero">
  <h1>Welcome to <span>BIMZ</span></h1>
  <p>Smart BIM & CAD Platform</p>
</div>

<div class="section">
  <h2>Tools</h2>

  <div class="tg" id="toolsContainer">

    <!-- TOOL -->
    <div class="tc">
      <div class="tc-name">Dynamo Auto Tag</div>
      <div class="tc-desc">Dynamo Script</div>

      <div class="tc-meta">
        <div>⭐ 5.0</div>
        <div>↓ 2</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

    <div class="tc">
      <div class="tc-name">LISP Find Replace</div>
      <div class="tc-desc">AutoCAD LISP</div>

      <div class="tc-meta">
        <div>⭐ 4.8</div>
        <div>↓ 5</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

    <div class="tc">
      <div class="tc-name">Revit Family Pack</div>
      <div class="tc-desc">Revit Families</div>

      <div class="tc-meta">
        <div>⭐ 4.9</div>
        <div>↓ 10</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

  </div>

</div>

</body>
</html>
