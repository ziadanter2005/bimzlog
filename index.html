<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Platform</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
}

.logo {
  color: #38bdf8;
  font-size: 22px;
  font-weight: bold;
}

/* CONTROLS */
.controls {
  text-align: center;
  margin: 20px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin: 5px;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(2,6,23,0.9);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 30px rgba(56,189,248,0.3);
}

.tag {
  color: #38bdf8;
  font-size: 14px;
}

/* ADMIN */
.admin {
  text-align: center;
  margin: 20px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">BIMZ</div>
  <div id="userName"></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search tools...">
  <select id="filter">
    <option value="all">All</option>
    <option value="Dynamo">Dynamo</option>
    <option value="LISP">LISP</option>
  </select>
  <br>
  <button id="loginBtn" onclick="login()">Login</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="admin" style="display:none;">
  <h3>Upload Tool</h3>
  <input id="toolName" placeholder="Tool Name"><br>
  <input id="toolType" placeholder="Type"><br>
  <input type="file" id="fileInput"><br>
  <button onclick="uploadTool()">Upload</button>
</div>

<div id="toolsContainer" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4",
  storageBucket: "bimz-439c4.firebasestorage.app",
  messagingSenderId: "755613694385",
  appId: "1:755613694385:web:3e4390196df61f45732590"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

let toolsData = [];

// LOGIN
window.login = async () => await signInWithPopup(auth, provider);
window.logout = async () => await signOut(auth);

// SAVE USER
async function saveUser(user){
  await setDoc(doc(db,"users",user.uid),{
    name:user.displayName,
    email:user.email
  });
}

// LOAD TOOLS
async function loadTools(){
  const snapshot = await getDocs(collection(db,"tools"));
  toolsData = snapshot.docs.map(doc=>doc.data());
  renderTools();
}

// RENDER
function renderTools(){
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const container = document.getElementById("toolsContainer");
  container.innerHTML = "";

  toolsData
  .filter(t => 
    (filter==="all" || t.type===filter) &&
    t.name.toLowerCase().includes(search)
  )
  .forEach(tool=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <h3>${tool.name}</h3>
      <p class="tag">${tool.type}</p>
      <a href="${tool.download}" target="_blank">
        <button>Download</button>
      </a>
    `;

    container.appendChild(div);
  });
}

// SEARCH & FILTER
document.getElementById("search").addEventListener("input",renderTools);
document.getElementById("filter").addEventListener("change",renderTools);

// UPLOAD
window.uploadTool = async ()=>{
  const name = toolName.value;
  const type = toolType.value;
  const file = fileInput.files[0];

  if(!name||!type||!file) return alert("Fill all");

  const storageRef = ref(storage,"tools/"+file.name);
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db,"tools"),{
    name,type,download:url
  });

  alert("Uploaded");
  loadTools();
};

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(user){
    loginBtn.style.display="none";
    logoutBtn.style.display="inline";
    userName.innerText="👤 "+user.displayName;

    if(user.email==="ziadanter101@gmail.com"){
      adminPanel.style.display="block";
    }

    saveUser(user);
    loadTools();
  }else{
    loginBtn.style.display="inline";
    logoutBtn.style.display="none";
    userName.innerText="";
    toolsContainer.innerHTML="";
    adminPanel.style.display="none";
  }
});
</script>

</body>
</html>
