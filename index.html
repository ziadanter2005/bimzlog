<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIMZ Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
}

.logo {
  color: #38bdf8;
  font-weight: bold;
  font-size: 20px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  border-radius: 8px;
  margin: 5px;
}

.card {
  background: #020617;
  padding: 20px;
  margin: 20px auto;
  width: 260px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

.admin {
  margin: 30px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">BIMZ</div>
  <div id="userName"></div>
</div>

<h1>Dashboard</h1>

<button id="loginBtn" onclick="login()">Login with Google</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>

<!-- Admin Panel -->
<div id="adminPanel" class="admin" style="display:none;">
  <h3>Upload Tool</h3>
  <input id="toolName" placeholder="Tool Name"><br>
  <input id="toolType" placeholder="Type (Dynamo / LISP)"><br>
  <input type="file" id="fileInput"><br>
  <button onclick="uploadTool()">Upload Tool</button>
</div>

<div id="toolsContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4qL5kQjBWNZg1JqDvYoRal3d_EODmoA4",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4",
  storageBucket: "bimz-439c4.firebasestorage.app",
  messagingSenderId: "755613694385",
  appId: "1:755613694385:web:3e4390196df61f45732590"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userName = document.getElementById("userName");
const toolsContainer = document.getElementById("toolsContainer");
const adminPanel = document.getElementById("adminPanel");

// Login
window.login = async () => await signInWithPopup(auth, provider);

// Logout
window.logout = async () => await signOut(auth);

// Save user
async function saveUser(user) {
  await setDoc(doc(db, "users", user.uid), {
    name: user.displayName,
    email: user.email,
    uid: user.uid
  });
}

// Upload Tool 🔥
window.uploadTool = async () => {
  const name = document.getElementById("toolName").value;
  const type = document.getElementById("toolType").value;
  const file = document.getElementById("fileInput").files[0];

  if (!name || !type || !file) return alert("Fill all fields");

  const storageRef = ref(storage, "tools/" + file.name);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "tools"), {
    name: name,
    type: type,
    download: url
  });

  alert("Uploaded ✅");
  loadTools();
};

// Load tools
async function loadTools() {
  const snapshot = await getDocs(collection(db, "tools"));
  toolsContainer.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const tool = docSnap.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${tool.name}</h3>
      <p>${tool.type}</p>
      <a href="${tool.download}" target="_blank">
        <button>Download</button>
      </a>
    `;

    toolsContainer.appendChild(div);
  });
}

// Auth
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";
    userName.innerText = "👤 " + user.displayName;

    if (user.email === "ziadanter101@gmail.com") {
      adminPanel.style.display = "block";
    }

    saveUser(user);
    loadTools();

  } else {
    loginBtn.style.display = "inline";
    logoutBtn.style.display = "none";
    userName.innerText = "";
    toolsContainer.innerHTML = "";
    adminPanel.style.display = "none";
  }
});
</script>

</body>
</html>
