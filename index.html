<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIMZ</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}

.btn{
  background:#38bdf8;
  border:none;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:50px;
  margin:0;
}

.hero span{
  color:#38bdf8;
}

.hero p{
  color:#94a3b8;
  margin-top:15px;
}

/* TOOLS */
.section{
  padding:40px;
  text-align:center;
}

.section h2{
  margin-bottom:30px;
}

/* GRID */
.tg{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.tc{
  background:#020617;
  padding:20px;
  border-radius:12px;
  border:1px solid #1e293b;
  transition:0.3s;
}

.tc:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

.tc-name{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.tc-desc{
  color:#94a3b8;
  margin-top:5px;
}

.tc-meta{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  font-size:14px;
}

.btn-download{
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

.btn-download:hover{
  background:#0ea5e9;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">BIMZ</div>
  <button class="btn">GET STARTED</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to <span>BIMZ</span></h1>
  <p>The #1 smart platform for BIM & CAD engineers</p>
</div>

<!-- TOOLS -->
<div class="section">
  <h2>BIMZ Tools</h2>

  <div class="tg">

    <!-- TOOL 1 -->
    <div class="tc">
      <div class="tc-name">Dynamo Auto Tag</div>
      <div class="tc-desc">Dynamo Script</div>

      <div class="tc-meta">
        <div>⭐ 5.0</div>
        <div>↓ 2</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

    <!-- TOOL 2 -->
    <div class="tc">
      <div class="tc-name">LISP Find Replace</div>
      <div class="tc-desc">AutoCAD LISP</div>

      <div class="tc-meta">
        <div>⭐ 4.8</div>
        <div>↓ 5</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

    <!-- TOOL 3 -->
    <div class="tc">
      <div class="tc-name">Revit Family Pack</div>
      <div class="tc-desc">Revit Families</div>

      <div class="tc-meta">
        <div>⭐ 4.9</div>
        <div>↓ 10</div>
      </div>

      <button class="btn-download">Download</button>
    </div>

  </div>

</div>

</body>
</html>
