<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:400px;
  text-align:center;
}
button{
  background:#38bdf8;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
  margin-top:20px;
}
</style>
</head>
<body>

<div class="card">
  <h2 id="name">Loading...</h2>
  <p id="desc"></p>
  <button id="downloadBtn">Download</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "bimz-439c4.firebaseapp.com",
  projectId: "bimz-439c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🧠 نجيب ID من الرابط
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 📦 نجيب الداتا
const ref = doc(db,"tools",id);
const snap = await getDoc(ref);

if(snap.exists()){
  const t = snap.data();

  document.getElementById("name").innerText = t.name;
  document.getElementById("desc").innerText = t.type;

  document.getElementById("downloadBtn").onclick = async () => {

    await updateDoc(ref,{
      downloads: increment(1)
    });

    window.open(t.download,"_blank");
  };

}else{
  document.getElementById("name").innerText = "Tool not found";
}

</script>

</body>
</html>
